<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资料卡片搜索</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-left">
      <h1 class="logo">资料卡片搜索</h1>
      <span class="stats-badge" id="statsBadge">加载中...</span>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="search">搜索</button>
      <button class="tab" data-tab="import">导入</button>
      <button class="tab" data-tab="generate">AI 生成</button>
    </nav>
    <button class="rebuild-btn" id="rebuildBtn">刷新索引</button>
  </header>

  <!-- 搜索面板 -->
  <section class="panel active" id="panel-search">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索卡片（支持中文、多关键词空格分隔）..." autocomplete="off">
      <select id="typeFilter"><option value="">全部类型</option></select>
      <button id="searchBtn" class="btn-primary">搜索</button>
      <button id="resetBtn" class="btn-secondary">重置</button>
    </div>
    <div class="search-meta">
      <label class="checkbox-label"><input type="checkbox" id="searchWorkspace" checked> 同时搜索章节/设定文件</label>
    </div>
    <div class="results-info" id="resultsInfo"></div>
    <div class="results" id="results"></div>
    <div id="workspaceResults"></div>
    <div class="empty-hint" id="emptyHint">输入关键词搜索资料库卡片，或选择类型浏览</div>
  </section>

  <!-- 导入面板 -->
  <section class="panel" id="panel-import">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">+</div>
      <p>拖拽 md/txt 文件到此处，或点击选择</p>
      <input type="file" id="fileInput" accept=".md,.txt" style="display:none">
    </div>
    <div class="section-title">已导入文件</div>
    <div id="importsList" class="file-list"></div>
  </section>

  <!-- AI 生成面板 -->
  <section class="panel" id="panel-generate">
    <div class="gen-layout">
      <div class="gen-left">
        <div class="form-group">
          <label>卡片模板</label>
          <select id="templateSelect"></select>
        </div>
        <div class="form-group">
          <label>从已导入文件加载</label>
          <select id="importSelect"><option value="">-- 手动粘贴 --</option></select>
        </div>
        <div class="form-group">
          <label>附加提示（可选）</label>
          <textarea id="customPromptInput" rows="2" placeholder="例如：重点提取人物关系和时间线"></textarea>
        </div>
        <div class="form-group">
          <label>文本内容</label>
          <textarea id="genTextInput" rows="10" placeholder="粘贴要提炼的文本，或从上方选择已导入文件..."></textarea>
        </div>
        <button id="generateBtn" class="btn-primary">生成卡片并写入资料库</button>
      </div>
      <div class="gen-right">
        <div class="section-title">生成结果</div>
        <div id="genResult"></div>
      </div>
    </div>
  </section>
</div>
<script src="app.js"></script>
</body>
</html>
